<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="500" fill="#ffffff" stroke="#888" />
  <!-- header -->
  <rect x="0" y="0" width="760" height="48" fill="#efe7da" stroke="#bbb"/>
  <text x="16" y="30" font-size="18" font-weight="bold">CafeExpress</text>
  <rect x="560" y="10" width="90" height="28" fill="#fff" stroke="#888"/>
  <text x="575" y="29" font-size="13">Mostrador</text>
  <rect x="655" y="10" width="80" height="28" fill="#efe7da" stroke="#888"/>
  <text x="668" y="29" font-size="13">Cocina</text>

  <text x="16" y="78" font-size="15" font-weight="bold">Menu</text>
  <!-- beverage cards -->
  <g stroke="#999" fill="#fff">
    <rect x="16" y="90" width="140" height="110"/>
    <rect x="170" y="90" width="140" height="110"/>
    <rect x="324" y="90" width="140" height="110"/>
    <rect x="16" y="212" width="140" height="110"/>
    <rect x="170" y="212" width="140" height="110"/>
  </g>
  <g font-size="12" fill="#333">
    <text x="28" y="115">Espresso</text><text x="28" y="135" fill="#777">$1.200</text>
    <text x="182" y="115">Americano</text><text x="182" y="135" fill="#777">$1.400</text>
    <text x="336" y="115">Latte</text><text x="336" y="135" fill="#777">$1.800</text>
    <text x="28" y="237">Capuchino</text><text x="28" y="257" fill="#777">$1.900</text>
    <text x="182" y="237">Te Chai</text><text x="182" y="257" fill="#777">$1.600</text>
  </g>
  <g fill="#e7d3b1" stroke="#888">
    <rect x="28" y="160" width="116" height="26"/>
    <rect x="182" y="160" width="116" height="26"/>
    <rect x="336" y="160" width="116" height="26"/>
    <rect x="28" y="282" width="116" height="26"/>
    <rect x="182" y="282" width="116" height="26"/>
  </g>
  <g font-size="11" fill="#333">
    <text x="55" y="177">Personalizar</text>
    <text x="209" y="177">Personalizar</text>
    <text x="363" y="177">Personalizar</text>
    <text x="55" y="299">Personalizar</text>
    <text x="209" y="299">Personalizar</text>
  </g>

  <!-- cart -->
  <rect x="500" y="90" width="244" height="380" fill="#fff" stroke="#999"/>
  <text x="516" y="114" font-size="14" font-weight="bold">Tu pedido (carrito)</text>
  <line x1="516" y1="128" x2="728" y2="128" stroke="#ddd"/>
  <text x="516" y="150" font-size="11" fill="#555">1x Latte + Shot + Vainilla .... $2.650</text>
  <text x="516" y="170" font-size="11" fill="#555">2x Espresso ................... $2.400</text>
  <text x="516" y="210" font-size="11">Nombre del cliente</text>
  <rect x="516" y="218" width="212" height="26" fill="#fff" stroke="#aaa"/>
  <text x="516" y="270" font-size="11">Descuento</text>
  <rect x="516" y="278" width="212" height="26" fill="#fff" stroke="#aaa"/>
  <text x="522" y="295" font-size="11" fill="#777">Estudiante (10%)  v</text>
  <line x1="516" y1="330" x2="728" y2="330" stroke="#ddd"/>
  <text x="516" y="350" font-size="12">Subtotal</text><text x="690" y="350" font-size="12">$5.050</text>
  <text x="516" y="370" font-size="12">Descuento</text><text x="680" y="370" font-size="12">- $505</text>
  <text x="516" y="392" font-size="14" font-weight="bold">Total</text><text x="675" y="392" font-size="14" font-weight="bold">$4.545</text>
  <rect x="516" y="410" width="212" height="36" fill="#2e7d5b" stroke="#1f5e43"/>
  <text x="566" y="433" font-size="13" fill="#fff">Confirmar pedido</text>
  <text x="16" y="492" font-size="10" fill="#999">Wireframe baja fidelidad - Vista Mostrador (cliente)</text>
</svg>
