  <text x="80" y="72" font-size="15" font-weight="bold">Personalizar Espresso</text>
  <text x="80" y="94" font-size="11" fill="#666">Agregale adicionales (patron Decorator).</text>

  <g font-size="12">
    <rect x="80" y="110" width="18" height="18" fill="#2e7d5b" stroke="#444"/><text x="106" y="124">Shot extra (+$500)</text>
