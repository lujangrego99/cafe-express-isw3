version: "3.8"

# CafeExpress - orquestacion full-stack.
# Levanta backend (Spring Boot) y frontend (Nginx) con un solo comando:
#   docker compose up --build
# Luego abrir http://localhost:5500

services:
  backend:
    build: ./cafe-pedidos-backend
    container_name: cafe-backend
    ports:
      - "8080:8080"

  frontend:
    build: ./cafe-pedidos-frontend
    container_name: cafe-frontend
    ports:
      - "5500:80"
    depends_on:
      - backend
